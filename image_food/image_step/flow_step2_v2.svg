<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="108" r="80" fill="#EFF6FF"/>

  <!-- Desk -->
  <rect x="28" y="140" width="144" height="8" rx="3" fill="#475569"/>
  <rect x="38" y="148" width="6" height="34" rx="2" fill="#334155"/>
  <rect x="156" y="148" width="6" height="34" rx="2" fill="#334155"/>

  <!-- Laptop screen -->
  <rect x="50" y="98" width="100" height="46" rx="5" fill="#1E293B"/>
  <rect x="55" y="102" width="90" height="38" rx="3" fill="#2563EB"/>
  <!-- Browser top bar -->
  <rect x="55" y="102" width="90" height="9" rx="3" fill="#1E40AF"/>
  <circle cx="62" cy="106" r="2.5" fill="#F87171"/>
  <circle cx="70" cy="106" r="2.5" fill="#FBBF24"/>
  <circle cx="78" cy="106" r="2.5" fill="#4ADE80"/>
  <!-- Job listing on screen -->
  <rect x="60" y="115" width="44" height="3" rx="1.5" fill="#FFFFFF"/>
  <rect x="60" y="121" width="34" height="2" rx="1" fill="#93C5FD"/>
  <rect x="60" y="126" width="38" height="2" rx="1" fill="#93C5FD"/>
  <rect x="60" y="131" width="30" height="2" rx="1" fill="#93C5FD"/>
  <!-- Publish button (green) -->
  <rect x="110" y="114" width="28" height="16" rx="4" fill="#4ADE80"/>
  <rect x="116" y="119" width="16" height="2" rx="1" fill="#14532D"/>
  <rect x="118" y="124" width="12" height="2" rx="1" fill="#14532D"/>

  <!-- Laptop base -->
  <rect x="36" y="144" width="128" height="5" rx="2.5" fill="#1E293B"/>

  <!-- Person -->
  <rect x="76" y="72" width="48" height="28" rx="7" fill="#1E40AF"/>
  <rect x="96" y="67" width="8" height="9" rx="3" fill="#FDBA74"/>
  <circle cx="100" cy="53" r="17" fill="#FDBA74"/>
  <path d="M83 45 Q100 30 117 45" fill="#1E293B"/>
  <!-- Tie -->
  <polygon points="99,72 101,83 103,72" fill="#93C5FD"/>

  <!-- Floating document with checkmark (right side) -->
  <rect x="155" y="52" width="28" height="38" rx="3" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="155" y="52" width="28" height="8" rx="3" fill="#3B82F6"/>
  <rect x="159" y="65" width="20" height="2" rx="1" fill="#93C5FD"/>
  <rect x="159" y="70" width="16" height="2" rx="1" fill="#93C5FD"/>
  <rect x="159" y="75" width="18" height="2" rx="1" fill="#93C5FD"/>
  <!-- Checkmark -->
  <circle cx="175" cy="82" r="7" fill="#3B82F6"/>
  <polyline points="171,82 174,85 179,78" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
