<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせありがとうございます | hitokiwa</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        .thanks-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
            padding: 40px 20px;
        }

        .thanks-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 51, 153, 0.1);
            padding: 60px 50px;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .thanks-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0066cc, #004499);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .thanks-icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .thanks-logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--secondary-color, #1a3a5c);
            margin-bottom: 30px;
            letter-spacing: -0.02em;
        }

        .thanks-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--secondary-color, #1a3a5c);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .thanks-body {
            font-size: 1rem;
            color: #4b5563;
            line-height: 1.9;
            margin-bottom: 40px;
        }

        .thanks-divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 30px 0;
        }

        .thanks-info {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.8;
        }

        .thanks-btn {
            display: inline-block;
            background: linear-gradient(135deg, #0066cc, #004499);
            color: #fff;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .thanks-btn:hover {
            opacity: 0.85;
        }

        @media (max-width: 576px) {
            .thanks-card {
                padding: 40px 24px;
            }

            .thanks-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MGK4F63H" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>

    <section class="thanks-section">
        <div class="thanks-card">

            <!-- チェックアイコン -->
            <div class="thanks-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <!-- ロゴ -->
            <div class="thanks-logo">hitokiwa</div>

            <!-- タイトル -->
            <h1 class="thanks-title">
                お問い合わせありがとうございます
            </h1>

            <!-- 本文 -->
            <p class="thanks-body">
                内容を確認のうえ、担当者より<br>
                2〜3営業日以内にご連絡いたします。<br><br>
                自動返信メールをお送りしていますので、<br>
                ご確認ください。
            </p>

            <!-- TOPへ戻るボタン -->
            <a href="/" class="thanks-btn">トップページへ戻る</a>

            <hr class="thanks-divider">

            <!-- 連絡先 -->
            <p class="thanks-info">
                お急ぎの場合はお電話ください<br>
                <strong>TEL: 03-6897-6289</strong><br>
                平日 9:00〜18:00
            </p>

        </div>
    </section>
</body>

</html>
